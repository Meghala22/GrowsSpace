[build]
  command = "npm run build"
  publish = "frontend/dist"
  functions = "backend/functions"

[dev]
  command = "npm run dev"
  targetPort = 5173
  port = 8888
  publish = "frontend/dist"
  autoLaunch = false

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
